<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500&display=swap" rel="stylesheet">

<title>For u bruh</title>

<style>
body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: linear-gradient(135deg, #ffe6f0, #ffcce0);
  text-align: center;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
}

h1 {
  font-size: 52px;
  margin-bottom: 10px;
}

.heart {
  font-size: 90px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

img {
  width: 160px;
  margin: 15px;
  border-radius: 20px;
}

.btn-container {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

button {
  font-size: 28px;
  padding: 14px 30px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  font-family: 'Pacifico', cursive;
}

#yes {
  background: #ff4d88;
  color: white;
}

#no {
  background: #888;
  color: white;
}

/* 💖 falling hearts */
.falling-heart {
  position: fixed;
  top: -20px;
  font-size: 24px;
  animation: fall linear forwards;
  pointer-events: none;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}

/* 🎉 confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 0;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="heart">❤️</div>
<h1>Do you like Ayaya? 😳</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<div class="btn-container">
  <button id="yes">Yes 💖</button>
  <button id="no">No 🥀</button>
</div>

<script>
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");

let yesSize = 28;
let noSize = 28;

noBtn.addEventListener("click", () => {
  yesSize += 10;
  noSize -= 6;

  yesBtn.style.fontSize = yesSize + "px";
  noBtn.style.fontSize = noSize + "px";

  if (noSize <= 6) {
    noBtn.style.display = "none";
  }
});

yesBtn.addEventListener("click", () => {
  document.body.innerHTML = `
    <h1 style="font-size:65px;">YAYYY 😍❤️</h1>
    <div style="font-size:120px;">💖💖💖</div>
  `;

  startHearts();
  startConfetti();
});

/* 💖 hearts */
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "falling-heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 200);
}

/* 🎉 confetti */
function startConfetti() {
  let colors = ["#ff4d88", "#ffd700", "#00ccff", "#66ff66", "#ff66cc"];

  setInterval(() => {
    let conf = document.createElement("div");
    conf.className = "confetti";

    conf.style.left = Math.random() * 100 + "vw";
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.animationDuration = (Math.random() * 2 + 2) + "s";

    document.body.appendChild(conf);

    setTimeout(() => conf.remove(), 4000);
  }, 100);
}
</script>

</body>
</html>
