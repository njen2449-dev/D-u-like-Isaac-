<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500&display=swap" rel="stylesheet">

  <title>For u bruh</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ffe6f0, #ffcce0);
      text-align: center;
      font-family: 'Quicksand', sans-serif;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .heart {
      font-size: 90px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    img {
      width: 160px;
      margin: 15px;
      border-radius: 20px;
    }

    .btn-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    button {
      font-size: 28px; /* awal agak gede */
      padding: 14px 30px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Pacifico', cursive;
    }

    #yes {
      background: #ff4d88;
      color: white;
    }

    #no {
      background: #888;
      color: white;
    }
  </style>
</head>
<body>

<div class="heart">❤️</div>

<h1>Do you love Ayaya? 😳</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="cute">

<div class="btn-container">
  <button id="yes">Yes 💖</button>
  <button id="no">No 🥀</button>
</div>

<script>
  let yesBtn = document.getElementById("yes");
  let noBtn = document.getElementById("no");

  let yesSize = 28;
  let noSize = 28;

  noBtn.addEventListener("click", () => {
    yesSize += 10;
    noSize -= 6;

    yesBtn.style.fontSize = yesSize + "px";
    noBtn.style.fontSize = noSize + "px";

    if (noSize <= 6) {
      noBtn.style.display = "none";
    }
  });

  yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
      <h1 style="font-size:65px;">YAYYY 😍❤️</h1>
      <div style="font-size:120px;">💖💖💖</div>
    `;
  });
</script>

</body>
</html>
