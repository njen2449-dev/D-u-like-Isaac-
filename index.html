<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500&display=swap" rel="stylesheet">

  <title>For fineshyt ❤️</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ffe6f0, #ffcce0);
      text-align: center;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .heart {
      font-size: 90px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    img {
      width: 160px;
      margin: 15px;
      border-radius: 20px;
    }

    button {
      font-size: 26px;
      padding: 12px 26px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Pacifico', cursive;
      position: relative;
    }

    #yes {
      background: #ff4d88;
      color: white;
    }

    #no {
      background: #888;
      color: white;
      position: absolute;
    }

    .falling-heart {
      position: absolute;
      top: -10px;
      font-size: 24px;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }
  </style>
</head>
<body>

<div class="heart">❤️</div>

<h1>Do you like Ayaya? 😳</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="cute">

<button id="yes">Yes sir 💖</button>
<button id="no">No 🥀</button>

<script>
  let yesBtn = document.getElementById("yes");
  let noBtn = document.getElementById("no");

  // tombol NO kabur 😈
  noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // klik YES
  yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
      <h1 style="font-size:65px;">YAYYY 😍❤️</h1>
      <div style="font-size:120px;">💖💖💖</div>
    `;
  });

  // efek love jatuh 💕
  setInterval(() => {
    let heart = document.createElement("div");
    heart.innerText = "💖";
    heart.className = "falling-heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 3000);
  }, 300);
</script>

</body>
</html>
